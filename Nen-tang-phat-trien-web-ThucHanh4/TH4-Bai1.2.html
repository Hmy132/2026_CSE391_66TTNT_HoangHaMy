<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điểm sinh viên nâng cao</title>
    <link rel="stylesheet" href="TH4-Bai1.2-CSS.css">
</head>
<body>
    <div class="main-container">
        <h2>Bảng điểm sinh viên (Có Lọc & Tìm kiếm)</h2>
        <div class="form-group">
            <label>Họ Tên: </label>
            <input type="text" id="fullName" placeholder="Nhập họ tên...">
        </div>
        <div class="form-group">
            <label>Điểm ( 0 - 10 ): </label>
            <input type="number" id="score" placeholder="Nhập điểm..." step="0.1">
        </div>
        <button id="btnAdd">Thêm sinh viên</button>

        <div class="filter-container">
            <input type="text" id="searchInput" placeholder="Tìm kiếm tên sinh viên...">
            <select id="filterSelect">
                <option value="Tất cả">Lọc Xếp loại: Tất cả</option>
                <option value="Giỏi">Giỏi</option>
                <option value="Khá">Khá</option>
                <option value="Trung Bình">Trung Bình</option>
                <option value="Yếu">Yếu</option>
            </select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Họ Tên</th>
                    <th id="colScore" title="Bấm để sắp xếp">Điểm <span id="sortIcon"></span></th>
                    <th>Xếp loại</th>
                    <th>Thao Tác</th>
                </tr>
            </thead>
            <tbody id="studentList">
            </tbody>
        </table>
        
        <p>
            Tổng số SV: <span id="totalStudents" style="color: blue; font-weight: bold;">0</span> |
            Điểm TB cả lớp: <span id="averageScore" style="color: red; font-weight: bold;">0.0</span>
        </p>
    </div>
    
    <script src="TH4-Bai1.2JS.js"></script>
</body>
</html>
