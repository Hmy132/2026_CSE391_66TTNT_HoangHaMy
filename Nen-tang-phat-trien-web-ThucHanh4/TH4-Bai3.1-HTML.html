<!DOCTYPE html>
<html lang="vi">
<head>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký</title>
    <link rel="stylesheet" href="TH4-Bai3.1-CSS.css">
</head>
<body>
    <div class="form-container">
        <div id="registerWrapper">
            <h2>Đăng Ký Tài Khoản</h2>
            <form id="registerForm" novalidate>
                
                <div class="form-group">
                    <label>Họ và tên *</label>
                    <input type="text" id="fullName" placeholder="Nhập họ tên..." maxlength="50">
                    <div class="char-counter" id="nameCharCount">0/50</div>
                    <span class="error-msg" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="email@domain.com">
                    <span class="error-msg" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label>Số điện thoại *</label>
                    <input type="tel" id="phone" placeholder="Ví dụ: 0987654321">
                    <span class="error-msg" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label>Mật khẩu *</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Tối thiểu 8 ký tự, có Hoa, thường, số">
                        <button type="button" id="togglePassword"><i class="bi bi-eye-slash"></i></button>
                    </div>
                    <div class="strength-meter">
                        <div class="strength-bar-bg">
                            <div class="strength-bar-fill" id="strengthBar"></div>
                        </div>
                        <span class="strength-text" id="strengthText"></span>
                    </div>

                    <span class="error-msg" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label>Xác nhận mật khẩu *</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                    </div>
                    <span class="error-msg" id="confirmPasswordError"></span>
                </div>

                <div class="form-group">
                    <label>Giới tính *</label>
                    <div class="radio-group">
                        <input type="radio" id="genderMale" name="gender" value="Nam"> <label for="genderMale" class="inline-label">Nam</label>
                        <input type="radio" id="genderFemale" name="gender" value="Nữ"> <label for="genderFemale" class="inline-label">Nữ</label>
                    </div>
                    <span class="error-msg" id="genderError"></span>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="terms">
                    <label for="terms" class="inline-label">Tôi đồng ý với các điều khoản sử dụng *</label>
                    <span class="error-msg" id="termsError"></span>
                </div>

                <button type="submit" id="btnSubmit">Đăng Ký Ngay</button>
            </form>
        </div>

        <div id="successWrapper" class="hidden">
            <h2 style="color: green;">Đăng ký thành công!</h2>
            <p>Chào mừng <strong id="registeredName"></strong> đã gia nhập hệ thống!</p>
        </div>
    </div>

    <script src="TH4-Bai3.1-JS.js"></script>
</body>
</html>
