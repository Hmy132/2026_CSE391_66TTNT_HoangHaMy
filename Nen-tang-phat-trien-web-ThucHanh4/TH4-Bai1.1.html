<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý điểm sinh viên</title>
    <link rel="stylesheet" href="TH4-Bai1.1-CSS.css">
</head>
<body>
    <div class="main-container">
        <h2>Bàng điểm sinh viên</h2>
        <div class="form-group">
            <label>Họ Tên: </label>
            <input type="text" id="Hoten" placeholder="Nhập họ tên...">
        </div>
        <div class="form-group">
            <label>Điểm ( 0 - 10 )</label>
            <input type="number" id="Diem" placeholder="Nhập điểm..." step="0.1">
        </div>
        <button id="btnThem">Thêm sinh viên</button>

        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Họ Tên</th>
                    <th>Điểm</th>
                    <th>Xếp loại</th>
                    <th>Thao Tác</th>
                </tr>
            </thead>
            <tbody id="DanhSach">

            </tbody>
        </table>
        <p>
            Tổng số SV: <span id="TongSV">0</span> |
            Điểm TB cả lớp: <span id="DiemTB">0.0</span>
        </p>
    </div>
    <script src="TH4-Bai1.1JS.js"></script>
</body>
</html>
