<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký</title>
    <link rel="stylesheet" href="Th4-Bai3.2-CSS.CSS">
</head>
<body>
    <div class="form-container">
        <div id="successWrapper" class="hidden">
            <div class="success-icon">✔️</div>
            <h2 style="color: green;">Hoàn tất đăng ký!</h2>
            <p>Tài khoản của bạn đã được tạo thành công.</p>
        </div>

        <div id="multiStepWrapper">
            <h2>Đăng Ký Tài Khoản</h2>
            <div class="progress-container">
                <div class="progress-info">Đang ở bước <span id="currentStepText">1</span>/3</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
            </div>

            <form id="multiStepForm" novalidate>
                <div class="step-content" id="step1">
                    <h3>Bước 1: Thông tin cá nhân</h3>
                    
                    <div class="form-group">
                        <label>Họ và tên *</label>
                        <input type="text" id="fullName" placeholder="Nhập họ và tên">
                        <span class="error-msg" id="nameError"></span>
                    </div>

                    <div class="form-group">
                        <label>Ngày sinh *</label>
                        <input type="date" id="dob">
                        <span class="error-msg" id="dobError"></span>
                    </div>

                    <div class="form-group">
                        <label>Giới tính *</label>
                        <div class="radio-group">
                            <input type="radio" id="genderMale" name="gender" value="Nam"> <label for="genderMale" class="inline-label">Nam</label>
                            <input type="radio" id="genderFemale" name="gender" value="Nữ"> <label for="genderFemale" class="inline-label">Nữ</label>
                        </div>
                        <span class="error-msg" id="genderError"></span>
                    </div>

                    <div class="btn-group right">
                        <button type="button" class="btn-next" id="btnNext1">Tiếp theo ➔</button>
                    </div>
                </div>
                <div class="step-content hidden" id="step2">
                    <h3>Bước 2: Thông tin tài khoản</h3>
                    
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" placeholder="Nhập email">
                        <span class="error-msg" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu *</label>
                        <input type="password" id="password" placeholder="Tối thiểu 8 ký tự, có Hoa, thường, số">
                        <span class="error-msg" id="passwordError"></span>
                    </div>

                    <div class="form-group">
                        <label>Xác nhận mật khẩu *</label>
                        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                        <span class="error-msg" id="confirmPasswordError"></span>
                    </div>

                    <div class="btn-group space-between">
                        <button type="button" class="btn-prev" id="btnPrev2">⬅ Quay lại</button>
                        <button type="button" class="btn-next" id="btnNext2">Tiếp theo ➔</button>
                    </div>
                </div>
                <div class="step-content hidden" id="step3">
                    <h3>Bước 3: Kiểm tra thông tin</h3>
                    
                    <div class="summary-box">
                        <p><strong>Họ tên:</strong> <span id="sumName"></span></p>
                        <p><strong>Ngày sinh:</strong> <span id="sumDob"></span></p>
                        <p><strong>Giới tính:</strong> <span id="sumGender"></span></p>
                        <p><strong>Email:</strong> <span id="sumEmail"></span></p>
                        <p style="color: gray; font-style: italic;">(Mật khẩu đã được bảo mật)</p>
                    </div>

                    <div class="btn-group space-between">
                        <button type="button" class="btn-prev" id="btnPrev3">⬅ Quay lại</button>
                        <button type="submit" class="btn-submit" id="btnSubmit">Hoàn tất Đăng Ký</button>
                    </div>
                </div>

            </form>
        </div>
    </div>

    <script src="Th4-Bai3.2-JS.js"></script>
</body>
</html>
