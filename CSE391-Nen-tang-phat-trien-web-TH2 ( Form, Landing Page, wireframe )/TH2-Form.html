<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TH2-Form</title>
    <link rel="stylesheet" href="TH2-Form.css">
</head>
<body>
    <div class="main-container">
        <h3>Get in touch with us by filling contact form below</h3>
        <div class="form-row">
            <input type="text" placeholder="* Enter your full name">
            <input type="email" placeholder="* Enter your email address">
        </div>
        <input type="text" placeholder="Enter your subject" class="full-width">
        <textarea placeholder="* Your message here..." rows="6" class="full-width"></textarea>
        <div class="form-footer">
            <button type="submit" class="btn-submit">Send message</button>
            <span class="note">* Please fill all required form field, thanks!</span>
        </div>
    </div>
</body>
</html>
